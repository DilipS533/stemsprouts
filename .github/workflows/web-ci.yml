name: Web CI

on:
  push:
    branches: [ main, stem-sprouts-revamp ]
  pull_request:
    branches: [ main, stem-sprouts-revamp ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install web deps
        run: |
          cd web
          npm ci
      - name: Build web
        run: |
          cd web
          npm run build
